[package]
name = "open-rust-mc"
version = "0.1.0"
edition = "2024"
license = "MIT"

[dependencies]
faer = "0.22"
hdf5-pure = "0.1"
rayon = "1"
ndarray = "0.16"
ndarray-npy = "0.9"
clap = { version = "4", features = ["derive"] }
thiserror = "2"
cudarc = { version = "0.16", optional = true, features = ["cuda-12090"] }

[features]
default = []
cuda = ["cudarc"]

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
unwrap_used = "deny"
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
module_name_repetitions = "allow"

[[bench]]
name = "reconstruction"
harness = false

[profile.release]
opt-level = 3
lto = "thin"

[profile.bench]
inherits = "release"
