[package]
name = "open-rust-mc"
version = "0.1.0"
edition = "2024"
license = "MIT"

[dependencies]
faer = "0.22"
hdf5-pure = "0.1"
rayon = "1"
ndarray = "0.16"
ndarray-npy = "0.9"
clap = { version = "4", features = ["derive"] }
thiserror = "2"
cudarc = { version = "0.19", optional = true, features = ["cuda-version-from-build-system"] }

[features]
default = []
cuda = ["cudarc"]

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }

[lints.clippy]
# Correctness / safety lints kept on. Style-oriented pedantic lints
# are too noisy for a numerical codebase (single-char physics
# identifiers like E/A/Q, long literals for constants, similar names
# like e_cm/e_cm_out are intentional and documented).
unwrap_used = "deny"
undocumented_unsafe_blocks = "warn"
# Keep the cast lints that catch real bugs off — every XS lookup does
# idx-from-usize casts that are safe by construction.
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
module_name_repetitions = "allow"

[[bench]]
name = "reconstruction"
harness = false

[profile.release]
opt-level = 3
lto = "thin"

[profile.bench]
inherits = "release"
