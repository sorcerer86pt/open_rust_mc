[workspace]
members = [".", "bindings/python"]
resolver = "2"

[package]
name = "open-rust-mc"
version = "0.4.0"
edition = "2024"
license = "MIT"

[dependencies]
# Math + data foundation extracted into its own crate
# (https://github.com/sorcerer86pt/Rust-MC-SimulationLib).
# Path-dep'd while the two crates co-evolve; switch to a versioned
# crates.io release once rust-mc-sim is published.
rust-mc-sim = { path = "../../rust-mc-sim", features = ["parallel"] }
faer = "0.22"
hdf5-pure = "0.1"
rayon = "1"
ndarray = "0.16"
ndarray-npy = "0.9"
clap = { version = "4", features = ["derive"] }
thiserror = "2"
cudarc = { version = "0.19", optional = true, features = ["cuda-version-from-build-system", "cublas", "nccl"] }

[features]
default = []
cuda = ["cudarc"]

[dev-dependencies]
criterion = { version = "0.8", features = ["html_reports"] }

[lints.clippy]
# Correctness / safety lints kept on. Style-oriented pedantic lints
# are too noisy for a numerical codebase (single-char physics
# identifiers like E/A/Q, long literals for constants, similar names
# like e_cm/e_cm_out are intentional and documented).
unwrap_used = "deny"
undocumented_unsafe_blocks = "warn"
# Keep the cast lints that catch real bugs off — every XS lookup does
# idx-from-usize casts that are safe by construction.
cast_possible_truncation = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
module_name_repetitions = "allow"

[[bin]]
name = "gpu_compton_validate"
required-features = ["cuda"]

[[bin]]
name = "gpu_compton_scaling"
required-features = ["cuda"]

[[bin]]
name = "gpu_photon_features"
required-features = ["cuda"]

[[bin]]
name = "gpu_cpu_bench"
required-features = ["cuda"]

[[bin]]
name = "gpu_bench"
required-features = ["cuda"]

[[bin]]
name = "gpu_pwr_bench"
required-features = ["cuda"]

[[bin]]
name = "gpu_cpu_trace"
required-features = ["cuda"]

[[bin]]
name = "gpu_wmp_validate"
required-features = ["cuda"]

[[bench]]
name = "reconstruction"
harness = false

[profile.release]
opt-level = 3
lto = "thin"

[profile.bench]
inherits = "release"
